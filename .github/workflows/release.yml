name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-14
    outputs:
      dmg-name: ${{ steps.dmg-info.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Check for signing secrets
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$APPLE_PASSWORD" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Signing + notarization: ENABLED"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "Signing + notarization: SKIPPED (secrets not configured)"
          fi

      - name: Build Tauri app (signed + notarized)
        if: steps.signing.outputs.signed == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Keepr ${{ github.ref_name }}"
          releaseBody: |
            See the changelog for details.

            **Install via Homebrew:**
            ```
            brew install --cask keeprlabs/tap/keepr
            ```

            Or download the `.dmg` below, drag Keepr to Applications.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      - name: Build Tauri app (unsigned)
        if: steps.signing.outputs.signed == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Keepr ${{ github.ref_name }}"
          releaseBody: |
            **This build is unsigned.** First launch: right-click the app
            icon, choose Open, then confirm the "unidentified developer"
            dialog. After the first launch, it opens normally.

            Signed and notarized builds will ship once the Apple Developer
            enrollment clears. See `docs/signing.md`.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      - name: Upload DMG as job artifact
        id: dmg-info
        run: |
          DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -n "$DMG" ]; then
            echo "path=$DMG" >> "$GITHUB_OUTPUT"
            echo "Found DMG: $DMG"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "No DMG found"
          fi

      - name: Upload DMG for homebrew job
        if: steps.dmg-info.outputs.path != ''
        uses: actions/upload-artifact@v7
        with:
          name: keepr-dmg
          path: ${{ steps.dmg-info.outputs.path }}
          retention-days: 1

  update-homebrew:
    name: Update Homebrew tap
    needs: build-macos
    runs-on: macos-14
    if: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG artifact
        uses: actions/download-artifact@v8
        with:
          name: keepr-dmg
          path: /tmp/dmg

      - name: Compute DMG SHA256
        id: sha
        run: |
          DMG=$(find /tmp/dmg -name "*.dmg" -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG artifact found, skipping homebrew update"
            exit 0
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Update cask formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" homebrew/keepr.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" homebrew/keepr.rb
          echo "Updated keepr.rb to version ${VERSION}, sha256 ${SHA}"
          cat homebrew/keepr.rb

      - name: Push to homebrew-tap repo
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        if: env.TAP_DEPLOY_KEY != ''
        run: |
          # Clone the tap repo, copy the updated formula, commit, push.
          mkdir -p ~/.ssh
          echo "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o StrictHostKeyChecking=no"

          git clone git@github.com:keeprlabs/homebrew-tap.git /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Casks
          cp homebrew/keepr.rb /tmp/homebrew-tap/Casks/keepr.rb
          cd /tmp/homebrew-tap
          git config user.name "keepr-bot"
          git config user.email "bot@keeprlabs.org"
          git add Casks/keepr.rb
          git diff --cached --quiet || git commit -m "Update keepr to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Update cask in this repo (fallback)
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        if: env.TAP_DEPLOY_KEY == ''
        run: |
          echo "TAP_DEPLOY_KEY not configured. Updated homebrew/keepr.rb locally."
          echo "To publish: copy homebrew/keepr.rb to the keeprlabs/homebrew-tap repo."
